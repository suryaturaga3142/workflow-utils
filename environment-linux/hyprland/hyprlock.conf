general {
    #disable_loading_bar = true
    hide_cursor = true
}

auth {
    fingerprint:enabled = true
}

background {
    monitor =
    path = /home/surya/Pictures/wallpapers/city2.jpg
    blur_passes = 1
    blur_size = 7
    noise = 0.02
    contrast = 1.1
    brightness = 0.75
    vibrancy = 0.15
    vibrancy_darkness = 0.2
}

# Fprint
label {
    monitor =
    text =  
    color = rgba(230,230,230,0.85)

    font_size = 50
    font_family = JetBrainsMono Nerd Font Mono

    position = 0, -80
    halign = center
    valign = top
}

# Big clock
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%H:%M')"
    color = rgba(255,255,255,1.0)

    font_size = 92
    font_family = JetBrainsMono Nerd Font

    position = 0, 200
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%A, %d %B %Y')"
    color = rgba(220,220,220,0.9)

    font_size = 22
    font_family = JetBrainsMono Nerd Font

    position = 0, 120
    halign = center
    valign = center
}

# Greeting
label {
    monitor =
    text = Hello, Surya
    color = rgba(230,230,230,0.85)

    font_size = 18
    font_family = JetBrainsMono Nerd Font

    position = 0, 0
    halign = center
    valign = center
}

# Password field
input-field {
    monitor =
    size = 280, 56

    outline_thickness = 2
    dots_size = 0.18
    dots_spacing = 0.25
    dots_center = true

    outer_color = rgba(255,255,255,0.15)
    inner_color = rgba(30,30,30,0.35)
    font_color = rgba(255,255,255,0.95)

    fade_on_empty = false
    placeholder_text = Password...

    position = 0, -60
    halign = center
    valign = center

    rounding = 16
}

# Battery percentage
label {
    monitor =
    text = cmd[update:30000] sh -c "cat /sys/class/power_supply/BAT0/capacity | head -n1 | xargs -I{} echo 'Battery {}%'"
    color = rgba(220,220,220,0.75)

    font_size = 16
    font_family = JetBrainsMono Nerd Font

    position = 0, 120
    halign = center
    valign = bottom
}

