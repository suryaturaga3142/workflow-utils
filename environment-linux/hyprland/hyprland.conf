# This config is a STUB! This should never be generated.
# Use the default lua config from https://github.com/hyprwm/Hyprland/blob/main/example/hyprland.lua

autogenerated = 0

$mainMod = SUPER
$terminal = kitty
$fileManager = dolphin
$menu = hyprlauncher

exec-once = mako
exec-once = waybar
exec-once = hyprpaper

# keybinds
bind = $mainMod, C, killactive,
#bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, M, exec, loginctl lock-session
bind = $mainMod, V, togglefloating,

bind = $mainMod, F, fullscreen, 0
bind = $mainMod, T, fullscreen, 1
resize_on_border = 1

# applications
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, W, exec, google-chrome-stable
bind = $mainMod, S, exec, code
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, A, exec, $menu

# switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# focus windows
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# move windows
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Move to previous/next workspace
bind = $mainMod, comma, workspace, m-1
bind = $mainMod, period, workspace, m+1

# Move current workspace left/right
bind = $mainMod SHIFT, comma, movetoworkspace, -1
bind = $mainMod SHIFT, period, movetoworkspace, +1

# volume
bindel = , XF86AudioRaiseVolume, exec, pamixer -i 5
bindel = , XF86AudioLowerVolume, exec, pamixer -d 5
bindel = , XF86AudioMute, exec, pamixer -t

# media
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# brightness
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    left_handed = true

    touchpad {
        natural_scroll = true
    }
}

